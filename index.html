    <title>GlowDocket</title>
    <script>
      // Apply the saved mode before styles load so native controls never paint
      // with the opposite system color scheme during startup.
      try {
        document.documentElement.dataset.theme = localStorage.getItem("theme") === "light" ? "light" : "dark";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
